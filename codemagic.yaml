# ─────────────────────────────────────────────────────────────────────────────
# Codemagic CI/CD — My Digital Closet iOS build
# ─────────────────────────────────────────────────────────────────────────────
#
# REQUIRED env vars — add in Codemagic → your app → Environment variables
# under a group called "signing":
#
#   APP_STORE_CONNECT_KEY_ID        67K2T48W7Y
#   APP_STORE_CONNECT_ISSUER_ID     66d4ce13-148d-4d6b-bab8-f1d0d8441a1e
#   APP_STORE_CONNECT_PRIVATE_KEY   Full contents of AuthKey_67K2T48W7Y.p8
#                                   (include the BEGIN/END PRIVATE KEY lines)
#
# Also required in group "build_env":
#   VITE_API_BASE_URL               Your deployed API URL

workflows:
  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mydigitalcloset.app
        api_key:
          key_id: $APP_STORE_CONNECT_KEY_ID
          issuer_id: $APP_STORE_CONNECT_ISSUER_ID
          private_key: $APP_STORE_CONNECT_PRIVATE_KEY
      xcode: latest
      node: 20
      groups:
        - signing
        - build_env
      vars:
        XCODE_SCHEME: App

    scripts:
      # 1 — Install pnpm + all workspace dependencies
      - name: Install pnpm and dependencies
        script: |
          npm install -g pnpm
          pnpm install --frozen-lockfile

      # 2 — Build the Vite web bundle for Capacitor
      - name: Build web assets
        script: |
          cd artifacts/outfit-generator
          VITE_API_BASE_URL=$VITE_API_BASE_URL pnpm vite build --config vite.capacitor.config.ts

      # 3 — Add the iOS platform if it does not already exist, then sync
      - name: Capacitor add iOS and sync
        script: |
          cd artifacts/outfit-generator
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      # 4 — Install CocoaPods dependencies
      - name: Pod install
        script: |
          cd artifacts/outfit-generator/ios/App
          pod install

      # 5 — Set build number from Codemagic's incremental counter
      - name: Set build number
        script: |
          cd artifacts/outfit-generator/ios/App
          agvtool new-version -all $BUILD_NUMBER

      # 6 — Build & archive
      - name: Xcode archive
        script: |
          xcodebuild \
            -workspace artifacts/outfit-generator/ios/App/App.xcworkspace \
            -scheme $XCODE_SCHEME \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            -destination "generic/platform=iOS" \
            archive \
            | xcpretty

      # 7 — Export the signed .ipa
      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            -exportOptionsPlist app-store/ExportOptions.plist \
            -exportPath $CM_BUILD_DIR/build/ipa \
            | xcpretty

    artifacts:
      - $CM_BUILD_DIR/build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key:
          key_id: $APP_STORE_CONNECT_KEY_ID
          issuer_id: $APP_STORE_CONNECT_ISSUER_ID
          private_key: $APP_STORE_CONNECT_PRIVATE_KEY
        submit_to_testflight: true
        submit_to_app_store: false
