# ─────────────────────────────────────────────────────────────────────────────
# Codemagic CI/CD — My Digital Closet iOS build
# ─────────────────────────────────────────────────────────────────────────────
#
# REQUIRED — Codemagic → your app → Environment variables
# Group "signing":
#   APP_STORE_CONNECT_KEY_IDENTIFIER   67K2T48W7Y
#   APP_STORE_CONNECT_ISSUER_ID        66d4ce13-148d-4d6b-bab8-f1d0d8441a1e
#   APP_STORE_CONNECT_PRIVATE_KEY      Full .p8 file contents (mark Secure)
#
# Group "build_env":
#   VITE_API_BASE_URL                  Your deployed API URL

workflows:
  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: My Digital Closet App

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mydigitalcloset.app
      xcode: latest
      node: 22
      groups:
        - signing
        - build_env
      vars:
        XCODE_SCHEME: App
        COREPACK_ENABLE_STRICT: "0"

    scripts:
      - name: Install pnpm and dependencies
        script: |
          corepack disable || true
          npm install -g pnpm@9 --force
          pnpm install --no-frozen-lockfile

      - name: Build web assets
        script: |
          cd artifacts/outfit-generator
          VITE_API_BASE_URL=$VITE_API_BASE_URL pnpm vite build --config vite.capacitor.config.ts

      - name: Capacitor add iOS and sync
        script: |
          cd artifacts/outfit-generator
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Set build number
        script: |
          cd artifacts/outfit-generator/ios/App
          agvtool new-version -all $BUILD_NUMBER

      - name: Resolve Swift Package dependencies
        script: |
          xcodebuild \
            -resolvePackageDependencies \
            -project artifacts/outfit-generator/ios/App/App.xcodeproj \
            -scheme $XCODE_SCHEME

      - name: Xcode archive
        script: |
          xcodebuild \
            -project artifacts/outfit-generator/ios/App/App.xcodeproj \
            -scheme $XCODE_SCHEME \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            -destination "generic/platform=iOS" \
            archive \
            | xcpretty

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            -exportOptionsPlist app-store/ExportOptions.plist \
            -exportPath $CM_BUILD_DIR/build/ipa \
            | xcpretty

    artifacts:
      - $CM_BUILD_DIR/build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
