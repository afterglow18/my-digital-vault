workflows:
  ios-release:
    name: iOS Release – My Digital Handbags
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: codemagic  # set up in Codemagic dashboard → Integrations

    environment:
      xcode: latest
      node: "18"
      vars:
        BUNDLE_ID: com.mydigitalhandbags.app
        XCODE_PROJECT: artifacts/outfit-generator/ios/App/App.xcodeproj
        XCODE_SCHEME: App
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mydigitalhandbags.app

    scripts:
      - name: Install dependencies
        script: |
          pnpm install --frozen-lockfile

      - name: Build web + sync Capacitor
        script: |
          pnpm --filter @workspace/outfit-generator run build:ios

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Increment build number
        script: |
          LATEST=$(app-store-connect get-latest-build-number "$BUNDLE_ID" 2>/dev/null || echo "0")
          cd artifacts/outfit-generator/ios/App
          agvtool new-version -all $((LATEST + 1))

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false  # flip to true when ready for full review
